name: Publish

# Publishes the honest-scholar package via PyPI Trusted Publishing (OIDC — no
# tokens). A version tag publishes to PyPI; manual dispatch publishes to the
# chosen `target` index (default **TestPyPI**, for pre-release validation).
# Requires pending/registered trusted publishers on both indexes for repo
# davorrunje/honest-scholar, workflow publish.yml, environments testpypi / pypi
# (see README / DISCLOSURE docs).

on:
  push:
    tags: ["v*"]   # includes pre-releases like v0.0.0a0
  workflow_dispatch:
    inputs:
      target:
        description: "Index to publish to"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: astral-sh/setup-uv@v6
      - name: Build sdist + wheel
        working-directory: honest-scholar
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: honest-scholar/dist/

  testpypi:
    # Manual dispatch with target=testpypi (default) — validate before a real release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Report the published version
        run: |
          version=$(basename "$(ls dist/*.whl | head -1)" | cut -d- -f2)
          url="https://test.pypi.org/project/honest-scholar/${version}/"
          echo "::notice title=Published to TestPyPI::honest-scholar ${version} -> ${url}"
          {
            echo "### 📦 Published to TestPyPI"
            echo ""
            echo "**honest-scholar ${version}** -> <${url}>"
            echo ""
            echo '```'
            echo "uv tool install --index https://test.pypi.org/simple/ honest-scholar==${version}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  pypi:
    # Version tag → PyPI, or manual dispatch with target=pypi
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1
      - name: Report the published version
        run: |
          version=$(basename "$(ls dist/*.whl | head -1)" | cut -d- -f2)
          url="https://pypi.org/project/honest-scholar/${version}/"
          echo "::notice title=Published to PyPI::honest-scholar ${version} -> ${url}"
          {
            echo "### 📦 Published to PyPI"
            echo ""
            echo "**honest-scholar ${version}** -> <${url}>"
            echo ""
            echo '```'
            echo "uv tool install honest-scholar==${version}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
