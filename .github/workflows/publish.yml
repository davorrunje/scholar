name: Publish

# Publishes the honest-scholar package via PyPI Trusted Publishing (OIDC — no
# tokens). A published **GitHub Release** publishes to PyPI; manual dispatch
# publishes to the chosen `target` index (default **TestPyPI**, for pre-release
# validation). Requires pending/registered trusted publishers on both indexes
# for repo davorrunje/honest-scholar, workflow publish.yml, environments
# testpypi / pypi (see README / RELEASING docs).

on:
  release:
    types: [published]   # includes pre-releases (a/b/rc) marked as such
  workflow_dispatch:
    inputs:
      target:
        description: "Index to publish to"
        type: choice
        options: [testpypi, pypi]
        default: testpypi

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.1
      - name: Guard — release tag matches package version
        if: github.event_name == 'release'
        run: |
          version=$(grep -m1 '^version' honest-scholar/pyproject.toml | cut -d'"' -f2)
          tag="${{ github.event.release.tag_name }}"
          if [ "$tag" != "v$version" ]; then
            echo "::error::release tag '$tag' does not match pyproject version 'v$version' — refusing to publish the wrong version"
            exit 1
          fi
          echo "release tag '$tag' matches pyproject 'v$version'"
      - name: Build sdist + wheel
        working-directory: honest-scholar
        run: uv build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: honest-scholar/dist/

  testpypi:
    # Manual dispatch with target=testpypi (default) — validate before a real release
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi' }}
    needs: build
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7 # resolve the local report-published action
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1 # Docker action — must stay top-level
        with:
          repository-url: https://test.pypi.org/legacy/
      - uses: ./.github/actions/report-published
        with:
          index: testpypi

  pypi:
    # Published GitHub Release → PyPI, or manual dispatch with target=pypi
    if: ${{ github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi') }}
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v7 # resolve the local report-published action
      - uses: actions/download-artifact@v4
        with: { name: dist, path: dist }
      - uses: pypa/gh-action-pypi-publish@release/v1 # Docker action — must stay top-level
      - uses: ./.github/actions/report-published
        with:
          index: pypi
